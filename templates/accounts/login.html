{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B3D5E">
  <title>Giriş — Archeon</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg viewBox="0 0 80 40" fill="none">
          <path d="M0 28 C10 18,20 38,30 28 S50 18,60 28 S70 38,80 28" stroke="#0B3D5E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M0 16 C10 6,20 26,30 16 S50 6,60 16 S70 26,80 16" stroke="#0B3D5E" stroke-width="2" fill="none" stroke-linecap="round" opacity=".35"/>
        </svg>
      </div>
      <div class="auth-app-name">Archelon</div>
      <div class="auth-app-sub">Yüzme Kulübü Sistemi</div>
    </div>

    <div class="auth-heading">Hoş geldiniz</div>
    <div class="auth-subtext">Devam etmek için giriş yapın</div>

    {% if form.errors %}
      <div class="alert alert-danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span>Kullanıcı adı veya şifre hatalı.</span>
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Kullanıcı adı</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Giriş Yap</button>
    </form>


  </div>
</div>
</body>
</html>
